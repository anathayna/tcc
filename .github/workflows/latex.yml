name: Build LaTeX
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v3
        with:
          root_file: latex/main.tex
          args: -pdf -file-line-error -interaction=nonstopmode
      - uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: tcc.pdf